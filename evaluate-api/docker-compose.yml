services:
  evaluate_pg:
    image: postgres:16
    container_name: evaluate_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: lexcrypta
      POSTGRES_PASSWORD: lexcrypta_pw
      POSTGRES_DB: lexcrypta
    volumes:
      - evaluate_pgdata:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexcrypta"]
      interval: 10s
      timeout: 5s
      retries: 5

  evaluate:
    build:
      context: .
    image: lexcrypta_evaluate:latest
    container_name: lexcrypta_evaluate
    restart: unless-stopped
    depends_on:
      evaluate_pg:
        condition: service_healthy
    ports:
      - "8084:8000"
    environment:
      DATABASE_URL: postgresql://lexcrypta:lexcrypta_pw@evaluate_pg:5432/lexcrypta
      LICENSE_SECRET: "$$Lexi2026-&LexCrypta-&Evaluate-&Secret$$"
      FIRM_TYPE: "ma"
      MAX_PDF_MB: "100"
      MAX_CSV_MB: "250"
      MAX_TOTAL_MB: "500"
    volumes:
      - evaluate_uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

volumes:
  evaluate_pgdata:
  evaluate_uploads:
